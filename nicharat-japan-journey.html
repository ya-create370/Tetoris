<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Nicharat Japan Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1a;--surface:rgba(255,255,255,0.06);--surface2:rgba(255,255,255,0.11);
  --border:rgba(255,255,255,0.12);--text:#f0ece4;--text-muted:rgba(240,236,228,0.5);
  --accent:#e8a87c;--accent2:#c97b5a;--gold:#d4af70;
  --visited:#4a9b6f;--wishlist:#5b8abf;--danger:#c0392b;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP','Noto Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
#bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f0f1a 0%,#1a1230 50%,#0d1a24 100%)}
#bg-layer.has-img{background-size:cover;background-position:center}
#bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(10,10,20,0.74);backdrop-filter:blur(2px)}
#app{position:relative;z-index:2;min-height:100vh}

/* ── LANG BAR ── */
.lang-bar{position:fixed;top:0;right:0;z-index:200;display:flex;gap:3px;padding:10px 12px}
.lang-btn{padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:rgba(15,15,26,0.88);backdrop-filter:blur(10px);color:var(--text-muted);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,175,112,0.15)}

/* ════════════════════════════
   LOGIN / USER SELECT SCREEN
════════════════════════════ */
#loginScreen{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(10,10,20,0.96);backdrop-filter:blur(16px);
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px;overflow-y:auto;
}
#loginScreen.show{display:flex}
.login-logo{font-family:'Cinzel',serif;font-size:20px;color:var(--gold);text-align:center;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 24px rgba(212,175,112,0.4)}
.login-sub{font-size:11px;color:var(--text-muted);letter-spacing:2px;text-align:center;margin-bottom:32px}

/* User list */
.user-list{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.user-tile{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;transition:all .22s;position:relative;
}
.user-tile:active{background:var(--surface2);border-color:var(--gold)}
.user-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;border:2px solid var(--border);
  font-family:'Noto Sans JP','Noto Sans Thai',sans-serif;
}
.user-info{flex:1;min-width:0}
.user-name{font-size:15px;font-weight:500;font-family:'Noto Serif JP','Noto Sans Thai',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-meta{font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:.5px}
.user-delete{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);
  font-size:13px;cursor:pointer;color:#e74c3c;transition:all .2s;
}
.user-delete:active{background:rgba(192,57,43,0.35)}

/* New user form */
.new-user-box{
  width:100%;max-width:360px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;
}
.new-user-title{font-size:11px;letter-spacing:2px;color:var(--gold);font-family:'Cinzel',serif;margin-bottom:14px;text-transform:uppercase}
.avatar-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.av-opt{
  width:40px;height:40px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  cursor:pointer;transition:all .2s;background:var(--surface);
}
.av-opt.sel{border-color:var(--gold);background:rgba(212,175,112,0.15)}
.login-inp{
  width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;outline:none;transition:border-color .2s;margin-bottom:10px;
  font-family:'Noto Sans JP','Noto Sans Thai',sans-serif;
}
.login-inp:focus{border-color:var(--gold)}
.login-inp::placeholder{color:var(--text-muted)}
.create-btn{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:500;
  cursor:pointer;transition:opacity .2s;
  font-family:'Noto Sans JP','Noto Sans Thai',sans-serif;
}
.create-btn:active{opacity:.85}
.empty-users{text-align:center;color:var(--text-muted);font-size:13px;padding:16px 0}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;padding-bottom:84px}
.screen.active{display:block}
#home{display:none;flex-direction:column;align-items:center;padding:0}
#home.active{display:flex}

/* ── USER BAR (top-left when logged in) ── */
#userBar{
  position:fixed;top:0;left:0;z-index:150;
  padding:10px 12px;display:none;align-items:center;gap:8px;
}
#userBar.show{display:flex}
.user-bar-avatar{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px}
.user-bar-name{font-size:12px;color:var(--gold);max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.switch-user-btn{padding:4px 10px;border-radius:99px;border:1px solid var(--border);background:rgba(15,15,26,0.85);backdrop-filter:blur(8px);font-size:10px;color:var(--text-muted);cursor:pointer;transition:all .2s}
.switch-user-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── HOME HERO ── */
.home-hero{width:100%;padding:58px 24px 36px;text-align:center;background:linear-gradient(180deg,rgba(212,175,112,0.1) 0%,transparent 100%);border-bottom:1px solid var(--border)}
.app-name{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:2px;color:var(--gold);text-shadow:0 0 30px rgba(212,175,112,0.4);margin-bottom:2px}
.app-tagline{font-size:12px;color:var(--text-muted);letter-spacing:1px;line-height:1.7}
.stamp-count{margin:22px auto 0;display:inline-flex;align-items:baseline;gap:6px}
.stamp-num{font-family:'Cinzel',serif;font-size:52px;font-weight:700;color:var(--accent);line-height:1}
.stamp-denom{font-size:18px;color:var(--text-muted);font-family:'Cinzel',serif}
.stamp-label{font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-top:4px}
.progress-wrap{width:100%;max-width:300px;margin:14px auto 0}
.progress-track{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.home-filters{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.f-btn{padding:6px 14px;border:1px solid var(--border);border-radius:99px;font-size:11px;color:var(--text-muted);background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.f-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,175,112,0.1)}

/* ── SECTIONS ── */
.home-sections{width:100%;padding:22px 20px 0}
.sec-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-family:'Cinzel',serif;margin-bottom:14px;padding-left:2px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.stat-num{font-family:'Cinzel',serif;font-size:22px;color:var(--accent)}
.stat-lbl{font-size:9px;color:var(--text-muted);margin-top:2px;letter-spacing:1px}
.recent-list{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory}
.recent-list::-webkit-scrollbar{display:none}
.recent-card{min-width:140px;height:100px;border-radius:var(--radius-sm);overflow:hidden;position:relative;flex-shrink:0;scroll-snap-align:start;cursor:pointer;border:1px solid var(--border)}
.recent-card img{width:100%;height:100%;object-fit:cover}
.recent-label{position:absolute;bottom:0;left:0;right:0;padding:20px 8px 8px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:12px;font-weight:500}
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.region-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.region-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .25s}
.region-card:active{transform:scale(.97);background:var(--surface2)}
.region-card:active::before{opacity:1}
.region-icon{font-size:26px;margin-bottom:8px}
.region-name{font-size:14px;font-weight:500;font-family:'Noto Serif JP','Noto Sans Thai',serif;line-height:1.3}
.region-sub{font-size:9px;color:var(--text-muted);margin-top:3px}
.region-badge{position:absolute;top:10px;right:10px;font-size:10px;color:var(--gold);font-family:'Cinzel',serif}
.bg-upload-btn{width:100%;padding:13px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);color:var(--text-muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.bg-upload-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── PREF LIST ── */
#prefList{padding:0}
.pref-header{position:sticky;top:0;z-index:10;background:rgba(15,15,26,0.93);backdrop-filter:blur(14px);padding:14px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .2s}
.pref-h-title{font-family:'Noto Serif JP','Noto Sans Thai',serif;font-size:17px}
.pref-h-sub{font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-top:1px}
.filter-bar{padding:10px 20px;display:flex;gap:8px;overflow-x:auto}
.filter-bar::-webkit-scrollbar{display:none}
.chip{padding:6px 13px;border-radius:99px;border:1px solid var(--border);font-size:11px;color:var(--text-muted);background:var(--surface);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.chip.active{border-color:var(--gold);color:var(--gold);background:rgba(212,175,112,0.12)}
.pref-grid{padding:8px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.pref-card.visited{border-color:rgba(74,155,111,.4);background:rgba(74,155,111,.08)}
.pref-card.wl{border-color:rgba(91,138,191,.4);background:rgba(91,138,191,.06)}
.pref-card:active{transform:scale(.97)}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);margin-bottom:10px;transition:background .3s}
.pref-card.visited .dot{background:var(--visited)}
.pref-card.wl .dot{background:var(--wishlist)}
.pref-name{font-size:15px;font-weight:500;font-family:'Noto Serif JP','Noto Sans Thai',serif;line-height:1.3}
.pref-en{font-size:10px;color:var(--text-muted);margin-top:2px}
.pref-icons{position:absolute;top:10px;right:10px;display:flex;gap:3px}
.pref-ico{font-size:13px}
.empty-state{grid-column:span 2;text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ── DETAIL ── */
#detail{padding:0}
.d-hero{position:relative;height:200px;overflow:hidden}
.d-hero img{width:100%;height:100%;object-fit:cover}
.d-hero-ov{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(10,10,20,.9) 100%)}
.d-back{position:absolute;top:16px;left:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;border:1px solid rgba(255,255,255,.2)}
.d-hero-info{position:absolute;bottom:18px;left:20px;right:20px}
.d-pref-name{font-family:'Noto Serif JP','Noto Sans Thai',serif;font-size:28px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.d-pref-en{font-size:12px;color:var(--text-muted);letter-spacing:2px}
.d-body{padding:18px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.toggle-lbl{font-size:13px;display:flex;align-items:center;gap:9px}
.tog{width:48px;height:26px;border-radius:13px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tog.on{background:var(--visited)}
.tog.fav{background:var(--gold)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 4px rgba(0,0,0,.3)}
.tog.on::after,.tog.fav::after{transform:translateX(22px)}
.inp-group{margin-bottom:14px}
.inp-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;display:block;font-family:'Cinzel',serif}
.inp{width:100%;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
textarea.inp{min-height:78px;resize:vertical}
.photo-sec{margin-bottom:18px}
.photo-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory}
.photo-scroll::-webkit-scrollbar{display:none}
.p-thumb{width:88px;height:88px;border-radius:10px;object-fit:cover;flex-shrink:0;scroll-snap-align:start;border:1px solid var(--border);cursor:pointer}
.p-add{width:88px;height:88px;border-radius:10px;background:var(--surface);border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;flex-shrink:0;font-size:10px;color:var(--text-muted);transition:all .2s}
.p-add:active{border-color:var(--gold);color:var(--gold)}
.p-add-icon{font-size:22px}
.save-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s;margin-top:6px;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.save-btn:active{opacity:.85}
.spot-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.spot-ico{font-size:26px;flex-shrink:0;margin-top:2px}
.spot-name{font-size:13px;font-weight:500;margin-bottom:4px}
.spot-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
.spot-cat{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.08);font-size:10px;color:var(--text-muted)}
.wl-btn{width:100%;padding:15px;border:1.5px solid var(--wishlist);border-radius:var(--radius);background:rgba(91,138,191,.1);color:var(--wishlist);font-size:14px;cursor:pointer;margin-top:8px;transition:all .2s;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.wl-btn.active{background:var(--wishlist);color:#fff}
.wl-btn:active{opacity:.8}
.divider{height:1px;background:var(--border);margin:18px 0}

/* ── PHOTO VIEWER ── */
#photoViewer{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column}
#photoViewer.open{display:flex}
#photoViewer img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px}
.v-close{position:absolute;top:20px;right:20px;font-size:26px;cursor:pointer;width:40px;height:40px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center}
.v-del{margin-top:14px;padding:10px 24px;background:rgba(192,57,43,.3);border:1px solid rgba(192,57,43,.5);border-radius:99px;color:#e74c3c;cursor:pointer;font-size:13px;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}

/* ── CONFIRM DIALOG ── */
#confirmDialog{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px}
#confirmDialog.show{display:flex}
.confirm-box{background:#1a1a2e;border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:320px;text-align:center}
.confirm-title{font-size:16px;font-weight:500;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.confirm-ok{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--danger);color:#fff;font-size:13px;cursor:pointer;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}

/* ── TOAST ── */
#toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(35,35,55,.95);border:1px solid var(--border);padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;z-index:400;transition:all .3s;white-space:nowrap;backdrop-filter:blur(12px);font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,26,.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;transition:all .2s}
.nav-ico{font-size:22px}
.nav-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.5px;font-family:'Noto Sans JP','Noto Sans Thai',sans-serif}
.nav-item.active .nav-lbl{color:var(--gold)}
.nav-item.active .nav-ico{filter:drop-shadow(0 0 6px var(--gold))}
input[type="file"]{display:none}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<!-- LANG BAR -->
<div class="lang-bar">
  <div class="lang-btn active" onclick="setLang('ja')">日本語</div>
  <div class="lang-btn" onclick="setLang('en')">EN</div>
  <div class="lang-btn" onclick="setLang('th')">ภาษาไทย</div>
</div>

<!-- USER BAR (top-left, shown when logged in) -->
<div id="userBar">
  <div class="user-bar-avatar" id="userBarAvatar"></div>
  <div class="user-bar-name" id="userBarName"></div>
  <div class="switch-user-btn" onclick="showLogin()" data-i="switchUser"></div>
</div>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen" class="show">
  <div class="login-logo">Nicharat Japan Journey</div>
  <div class="login-sub" data-i="loginSubtitle"></div>

  <!-- Existing users -->
  <div class="user-list" id="userList"></div>

// ════════════════════════════════
//  STATE
// ════════════════════════════════
let lang = localStorage.getItem('njj_lang') || 'ja';
let currentUserId = null;   // active user
let currentRegion = null;
let currentPref   = null;
let viewerPhotoIndex = null;
let viewerPrefKey    = null;
let currentScreen    = 'home';
let prefFilter       = 'all';
let selectedAvatar   = AVATARS[0];
let confirmCallback  = null;

// ════════════════════════════════
//  USER STORAGE
//  users list: localStorage key "njj_users" → [{id,name,avatar,lastLogin}]
//  user data:  localStorage key "njj_u_{uid}_{pref}" → {visited,favorite,...}
//  user bg:    localStorage key "njj_ubg_{uid}"
// ════════════════════════════════
function getUsers() {
  try { return JSON.parse(localStorage.getItem('njj_users')) || []; } catch { return []; }
}
function saveUsers(arr) { localStorage.setItem('njj_users', JSON.stringify(arr)); }

function getData(pref) {
  if (!currentUserId) return blankData();
  const raw = localStorage.getItem(`njj_u_${currentUserId}_${pref}`);
  return raw ? JSON.parse(raw) : blankData();
}
function setData(pref, obj) {
  if (!currentUserId) return;
  localStorage.setItem(`njj_u_${currentUserId}_${pref}`, JSON.stringify(obj));
}
function blankData() { return {visited:false,favorite:false,visitDate:'',comment:'',photos:[],wishlist:false}; }

function getUserBg() { return currentUserId ? (localStorage.getItem(`njj_ubg_${currentUserId}`) || '') : ''; }
function setUserBg(d) { if (currentUserId) localStorage.setItem(`njj_ubg_${currentUserId}`, d); }

function deleteUserData(uid) {
  // remove all keys for this user
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i));
  keys.filter(k => k.startsWith(`njj_u_${uid}_`) || k === `njj_ubg_${uid}`).forEach(k => localStorage.removeItem(k));
}

// ════════════════════════════════
//  i18n
// ════════════════════════════════
function t(key) { return I18N[lang]?.[key] ?? I18N.en[key] ?? key; }

function applyLang() {
  document.documentElement.lang = lang;
  const labels = {ja:'日本語',en:'EN',th:'ภาษาไทย'};
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === labels[lang]));
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.dataset.i; if (k) el.textContent = t(k);
  });
  document.querySelectorAll('[data-placeholder-i]').forEach(el => {
    el.placeholder = t(el.dataset.placeholderI);
  });
  if (document.getElementById('tagline')) document.getElementById('tagline').textContent = t('tagline');
  if (document.getElementById('stampLabel')) document.getElementById('stampLabel').textContent = t('stampLabel');
}

function setLang(l) {
  lang = l; localStorage.setItem('njj_lang', l); applyLang();
  renderLoginScreen();
  if (currentUserId) {
    if (currentScreen==='home') renderHome();
    else if (currentScreen==='prefList') renderPrefGrid(currentRegion ? currentRegion.prefs : Object.keys(PREFS));
    else if (currentScreen==='detail' && currentPref) openPref(currentPref);
  }
}

// ════════════════════════════════
//  LOGIN SCREEN
// ════════════════════════════════
function renderLoginScreen() {
  applyLang();
  // Avatar picker
  const ar = document.getElementById('avatarRow');
  ar.innerHTML = AVATARS.map(a =>
    `<div class="av-opt ${a===selectedAvatar?'sel':''}" onclick="selectAvatar('${a}')">${a}</div>`
  ).join('');

  // User list
  const ul = document.getElementById('userList');
  const users = getUsers();
  if (!users.length) {
    ul.innerHTML = `<div class="empty-users">${t('noUsers')}</div>`;
    return;
  }
  ul.innerHTML = users.map(u => {
    // count visited
    const vc = Object.keys(PREFS).filter(p => {
      const raw = localStorage.getItem(`njj_u_${u.id}_${p}`);
      return raw && JSON.parse(raw).visited;
    }).length;
    const lastDate = u.lastLogin ? new Date(u.lastLogin).toLocaleDateString(lang==='th'?'th-TH':lang==='ja'?'ja-JP':'en-US',{year:'numeric',month:'short',day:'numeric'}) : '—';
    return `<div class="user-tile" onclick="loginAs('${u.id}')">
      <div class="user-avatar">${u.avatar}</div>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-meta">${t('visitedCount')}: ${vc} / 47 &nbsp;·&nbsp; ${t('lastLogin')}: ${lastDate}</div>
      </div>
      <div class="user-delete" onclick="event.stopPropagation();confirmDeleteUser('${u.id}','${u.name}')" title="delete">🗑️</div>
    </div>`;
  }).join('');
}

function selectAvatar(a) {
  selectedAvatar = a;
  document.querySelectorAll('.av-opt').forEach(el => el.classList.toggle('sel', el.textContent===a));
}

function createUser() {
  const name = document.getElementById('newUserName').value.trim();
  if (!name) { document.getElementById('newUserName').focus(); return; }
  const users = getUsers();
  const id = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  users.push({ id, name, avatar: selectedAvatar, lastLogin: null });
  saveUsers(users);
  document.getElementById('newUserName').value = '';
  showToast(t('toastUserCreated'));
  loginAs(id);
}

function loginAs(uid) {
  const users = getUsers();
  const u = users.find(x => x.id===uid);
  if (!u) return;
  u.lastLogin = new Date().toISOString();
  saveUsers(users);
  currentUserId = uid;
  localStorage.setItem('njj_lastUser', uid);

  // User bar
  document.getElementById('userBarAvatar').textContent = u.avatar;
  document.getElementById('userBarName').textContent   = u.name;
  document.getElementById('userBar').classList.add('show');
  document.querySelector('.switch-user-btn').textContent = t('switchUser');

  // Apply user background
  const bg = getUserBg();
  const bgEl = document.getElementById('bg-layer');
  if (bg) { bgEl.style.backgroundImage=`url(${bg})`; bgEl.classList.add('has-img'); }
  else    { bgEl.style.backgroundImage=''; bgEl.classList.remove('has-img'); }

  // Hide login, show app
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('app').style.display = 'block';
  renderHome();
  showScreen('home');
}

function showLogin() {
  currentUserId = null;
  document.getElementById('userBar').classList.remove('show');
  document.getElementById('app').style.display = 'none';
  renderLoginScreen();
  document.getElementById('loginScreen').classList.add('show');
}

function confirmDeleteUser(uid, name) {
  document.getElementById('confirmTitle').textContent = t('deleteUserTitle');
  document.getElementById('confirmMsg').textContent   = t('deleteUserMsg').replace('{name}', name);
  document.getElementById('confirmOk').textContent     = t('confirmDelete');
  document.getElementById('confirmCancel').textContent = t('cancel');
  document.getElementById('confirmOk').onclick = () => { doDeleteUser(uid); closeConfirm(); };
  document.getElementById('confirmDialog').classList.add('show');
}
function closeConfirm() { document.getElementById('confirmDialog').classList.remove('show'); }

function doDeleteUser(uid) {
  deleteUserData(uid);
  const users = getUsers().filter(u => u.id!==uid);
  saveUsers(users);
  showToast(t('toastUserDeleted'));
  renderLoginScreen();
}

// ════════════════════════════════
//  HOME
// ════════════════════════════════
function renderHome() {
  const allPrefs = Object.keys(PREFS);
  const visitedList = allPrefs.filter(p => getData(p).visited);
  const favList     = allPrefs.filter(p => getData(p).favorite);
  const wishList    = allPrefs.filter(p => getData(p).wishlist);

  document.getElementById('visitedCount').textContent     = visitedList.length;
  document.getElementById('progressFill').style.width     = (visitedList.length/47*100)+'%';
  document.getElementById('statVisited').textContent      = visitedList.length;
  document.getElementById('statFav').textContent          = favList.length;
  document.getElementById('statWish').textContent         = wishList.length;

  // Recent
  const recent = allPrefs.filter(p=>{ const d=getData(p); return d.visited && d.photos?.length; }).slice(-8).reverse();
  const recentSec = document.getElementById('recentSection');
  if (recent.length) {
    recentSec.style.display='block';
    document.getElementById('recentList').innerHTML = recent.map(p=>{
      const d=getData(p);
      return `<div class="recent-card" onclick="openPref('${p}')"><img src="${d.photos[0]}" alt=""><div class="recent-label">${p}</div></div>`;
    }).join('');
  } else { recentSec.style.display='none'; }

  // Regions
  document.getElementById('regionGrid').innerHTML = REGIONS.map(r=>{
    const vis = r.prefs.filter(p=>getData(p).visited).length;
    return `<div class="region-card" onclick="openRegion('${r.id}')">
      <div class="region-icon">${r.icon}</div>
      <div class="region-name">${t('regionNames')[r.id]}</div>
      <div class="region-sub">${r.en}</div>
      <div class="region-badge">${vis}/${r.prefs.length}</div>
    </div>`;
  }).join('');

  applyLang();
}

// ════════════════════════════════
//  NAVIGATION
// ════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0); currentScreen=id;
}
function goHome() { renderHome(); showScreen('home'); }
function goBack() { showScreen(currentScreen==='detail'?'prefList':'home'); }
function setNav(i) { document.querySelectorAll('.nav-item').forEach((el,j)=>el.classList.toggle('active',i===j)); }
function showRegionSelect() { goHome(); }
function showFavorites() { openFiltered('favorite'); setNav(2); }
function showWishlist()  { openFiltered('wishlist');  setNav(3); }

function openFiltered(filter) {
  currentRegion=null;
  document.getElementById('regionTitle').textContent = filter==='favorite'?t('favorites'):t('wishlist');
  document.getElementById('regionSub').textContent   = filter==='favorite'?'FAVORITES':'WISHLIST';
  prefFilter=filter;
  renderPrefGrid(Object.keys(PREFS));
  showScreen('prefList');
}

function openRegion(rid) {
  currentRegion = REGIONS.find(r=>r.id===rid);
  document.getElementById('regionTitle').textContent = t('regionNames')[rid];
  document.getElementById('regionSub').textContent   = currentRegion.en;
  prefFilter='all';
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.pf==='all'));
  renderPrefGrid(currentRegion.prefs);
  showScreen('prefList');
}

function setPrefFilter(f,el) {
  prefFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderPrefGrid(currentRegion?currentRegion.prefs:Object.keys(PREFS));
}

function renderPrefGrid(prefs) {
  let list=prefs;
  if(prefFilter==='visited')   list=prefs.filter(p=>getData(p).visited);
  if(prefFilter==='unvisited') list=prefs.filter(p=>!getData(p).visited);
  if(prefFilter==='wishlist')  list=prefs.filter(p=>getData(p).wishlist);
  if(prefFilter==='favorite')  list=prefs.filter(p=>getData(p).favorite);
  if(!list.length){
    document.getElementById('prefGrid').innerHTML=`<div class="empty-state"><div class="empty-icon">🗾</div>${t('empty')}</div>`;
    return;
  }
  document.getElementById('prefGrid').innerHTML=list.map(p=>{
    const d=getData(p),info=PREFS[p];
    const cls=d.visited?'visited':(d.wishlist?'wl':'');
    const icons=[d.favorite?'⭐':'',d.photos?.length?'📷':'',d.wishlist&&!d.visited?'🔖':''].filter(Boolean);
    const sub=lang==='th'?info.th:info.en;
    return `<div class="pref-card ${cls}" onclick="openPref('${p}')">
      <div class="dot"></div>
      <div class="pref-name">${p}</div>
      <div class="pref-en">${sub}</div>
      <div class="pref-icons">${icons.map(i=>`<span class="pref-ico">${i}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function setHomeFilter(f) {
  document.querySelectorAll('.f-btn').forEach(el=>el.classList.remove('on'));
  document.getElementById('filter-'+f).classList.add('on');
  if(f==='all'){goHome();return;}
  currentRegion=null;
  const tm={visited:t('visited'),wishlist:t('wishlist'),fav:t('favorites')};
  document.getElementById('regionTitle').textContent=tm[f];
  document.getElementById('regionSub').textContent=f.toUpperCase();
  prefFilter=f==='fav'?'favorite':f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  renderPrefGrid(Object.keys(PREFS));
  showScreen('prefList');
}

// ════════════════════════════════
//  DETAIL
// ════════════════════════════════
function openPref(pref) {
  currentPref=pref;
  const info=PREFS[pref],data=getData(pref);
  document.getElementById('detailPrefName').textContent=pref;
  document.getElementById('detailPrefSub').textContent=lang==='th'?info.th:info.en;
  document.getElementById('detailHeroImg').src=data.photos?.length?data.photos[0]:info.img;
  document.getElementById('detailBody').innerHTML=data.visited?renderVisited(pref,data):renderUnvisited(pref,data,info);
  showScreen('detail');
}
function renderVisited(pref,data){
  return `
  <div class="toggle-row"><div class="toggle-lbl">${t('visitedStatus')}</div><div class="tog on" onclick="toggleVisited('${pref}')"></div></div>
  <div class="toggle-row"><div class="toggle-lbl">${t('favoriteLabel')}</div><div class="tog ${data.favorite?'fav':''}" onclick="toggleFavorite('${pref}')"></div></div>
  <div class="inp-group"><label class="inp-label">${t('visitDate')}</label><input type="date" class="inp" id="visitDate" value="${data.visitDate||''}"></div>
  <div class="inp-group"><label class="inp-label">${t('memories')}</label><textarea class="inp" id="commentField" placeholder="${t('memoriesPlaceholder')}">${data.comment||''}</textarea></div>
  <div class="photo-sec">
    <label class="inp-label">${t('photos')} (${data.photos?.length||0}/10)</label>
    <div class="photo-scroll" id="photoRow">
      ${(data.photos||[]).map((p,i)=>`<img class="p-thumb" src="${p}" onclick="openViewer('${pref}',${i})">`).join('')}
      ${(data.photos?.length||0)<10?`<div class="p-add" onclick="triggerPhotoUpload('${pref}')"><span class="p-add-icon">📷</span><span>${t('addPhoto')}</span></div>`:''}
    </div>
  </div>
  <button class="save-btn" onclick="saveComment('${pref}')">${t('save')}</button>`;
}
function renderUnvisited(pref,data,info){
  const spots=info.spots.map(s=>`
    <div class="spot-card"><div class="spot-ico">${s.icon}</div><div>
      <div class="spot-name">${s.name[lang]||s.name.en}</div>
      <div class="spot-desc">${s.desc[lang]||s.desc.en}</div>
      <span class="spot-cat">${s.cat[lang]||s.cat.en}</span>
    </div></div>`).join('');
  return `
  <div class="toggle-row"><div class="toggle-lbl">${t('notVisitedStatus')}</div><div class="tog" onclick="toggleVisited('${pref}')"></div></div>
  <div class="divider"></div>
  <div class="sec-title" style="padding:0 0 4px">${t('recommendedSpots')}</div>
  ${spots}
  <button class="wl-btn ${data.wishlist?'active':''}" onclick="toggleWishlist('${pref}')" id="wishBtn">
    ${data.wishlist?t('removeFromWishlist'):t('addToWishlist')}
  </button>`;
}

// ════════════════════════════════
//  ACTIONS
// ════════════════════════════════
function toggleVisited(p){const d=getData(p);d.visited=!d.visited;if(!d.visited)d.favorite=false;setData(p,d);openPref(p);showToast(d.visited?t('toastVisited'):t('toastUnvisited'));}
function toggleFavorite(p){const d=getData(p);d.favorite=!d.favorite;setData(p,d);openPref(p);showToast(d.favorite?t('toastFavOn'):t('toastFavOff'));}
function toggleWishlist(p){
  const d=getData(p);d.wishlist=!d.wishlist;setData(p,d);
  const btn=document.getElementById('wishBtn');
  if(btn){btn.classList.toggle('active',d.wishlist);btn.textContent=d.wishlist?t('removeFromWishlist'):t('addToWishlist');}
  showToast(d.wishlist?t('toastWlOn'):t('toastWlOff'));
}
function saveComment(p){
  const d=getData(p);
  d.comment=document.getElementById('commentField')?.value||'';
  d.visitDate=document.getElementById('visitDate')?.value||'';
  setData(p,d);showToast(t('toastSaved'));
}

// ════════════════════════════════
//  PHOTOS
// ════════════════════════════════
function triggerPhotoUpload(p){const inp=document.getElementById('photoUpload');inp.onchange=e=>handlePhotoUpload(e,p);inp.click();}
async function handlePhotoUpload(e,p){
  const files=Array.from(e.target.files);const d=getData(p);if(!d.photos)d.photos=[];
  const toProcess=files.slice(0,10-d.photos.length);
  for(const f of toProcess)d.photos.push(await compressImage(f,800,.7));
  setData(p,d);e.target.value='';openPref(p);showToast(`📷 ${toProcess.length} ${t('toastPhotoAdded')}`);
}
function compressImage(file,maxSize,quality){
  return new Promise(resolve=>{
    const img=new Image(),reader=new FileReader();
    reader.onload=ev=>{img.onload=()=>{
      const canvas=document.createElement('canvas');let w=img.width,h=img.height;
      if(w>maxSize){h=h*maxSize/w;w=maxSize;}if(h>maxSize){w=w*maxSize/h;h=maxSize;}
      canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };img.src=ev.target.result;};
    reader.readAsDataURL(file);
  });
}
function openViewer(p,idx){
  viewerPrefKey=p;viewerPhotoIndex=idx;
  document.getElementById('viewerImg').src=getData(p).photos[idx];
  document.getElementById('vDelBtn').textContent=t('deletePhoto');
  document.getElementById('photoViewer').classList.add('open');
}
function closeViewer(){document.getElementById('photoViewer').classList.remove('open');viewerPhotoIndex=null;viewerPrefKey=null;}
function deleteViewerPhoto(){
  if(!viewerPrefKey||viewerPhotoIndex===null)return;
  const d=getData(viewerPrefKey);d.photos.splice(viewerPhotoIndex,1);
  setData(viewerPrefKey,d);closeViewer();openPref(viewerPrefKey);showToast(t('toastPhotoDeleted'));
}
async function handleBgUpload(e){
  const file=e.target.files[0];if(!file)return;
  const c=await compressImage(file,1200,.75);setUserBg(c);
  const el=document.getElementById('bg-layer');el.style.backgroundImage=`url(${c})`;el.classList.add('has-img');
  e.target.value='';showToast(t('toastBg'));
}

// ════════════════════════════════
//  TOAST
// ════════════════════════════════
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400);
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
function init() {
  applyLang();
  renderLoginScreen();
  // Auto-login last user if exists
  const lastUid = localStorage.getItem('njj_lastUser');
  if (lastUid && getUsers().find(u=>u.id===lastUid)) {
    loginAs(lastUid);
  }
}

init();
</script>
